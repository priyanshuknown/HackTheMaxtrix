version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vidyafund_db
    environment:
      POSTGRES_USER: vidyafund
      POSTGRES_PASSWORD: vidyafund
      POSTGRES_DB: vidyafund
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
